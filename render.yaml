services:
  - type: web
    name: stayz-api
    runtime: node
    rootDir: backend/stayz_api
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: PAYOS_CLIENT_ID
        sync: false
      - key: PAYOS_API_KEY
        sync: false
      - key: PAYOS_CHECKSUM_KEY
        sync: false
      - key: PAYOS_RETURN_URL
        value: https://stayz-api.onrender.com/api/payment/return
      - key: PAYOS_CANCEL_URL
        value: https://stayz-api.onrender.com/api/payment/cancel
